name: Backend CI

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Compile (Flyway migrate + jOOQ codegen)
        working-directory: backend
        run: ./gradlew compileJava

      - name: Test
        working-directory: backend
        run: ./gradlew test
