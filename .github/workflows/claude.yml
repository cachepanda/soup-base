name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  check_run:
    types: [completed]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'check_run' && github.event.check_run.conclusion == 'failure' && contains(fromJSON('["Backend CI", "Frontend CI"]'), github.event.check_run.name) && github.event.check_run.sender.login != 'claude[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push branches
      pull-requests: write   # open and update PRs
      issues: write          # comment on issues
      id-token: write
      actions: read          # read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash(gh *),Bash(git *)"
          additional_permissions: |
            actions: read
