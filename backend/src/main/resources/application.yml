spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${CONTROL_PLANE_DB_URL:jdbc:postgresql://localhost:5432/soupbase}
    username: ${CONTROL_PLANE_DB_USERNAME:soupbase}
    password: ${CONTROL_PLANE_DB_PASSWORD:soupbase}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

hosted-cluster:
  datasource:
    url: ${HOSTED_CLUSTER_DB_URL:jdbc:postgresql://localhost:5433/postgres}
    username: ${HOSTED_CLUSTER_DB_USERNAME:postgres}
    password: ${HOSTED_CLUSTER_DB_PASSWORD:postgres}

clerk:
  jwks-url: ${CLERK_JWKS_URL:https://your-clerk-domain.clerk.accounts.dev/.well-known/jwks.json}
  issuer: ${CLERK_ISSUER:https://your-clerk-domain.clerk.accounts.dev}
